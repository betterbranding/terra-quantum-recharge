<style>
body{padding-top:60px;}
.tqr-nav{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:rgba(10,10,26,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:0 1.5rem;
  transition:box-shadow 0.3s;
}
.tqr-nav.scrolled{box-shadow:0 4px 30px rgba(128,0,255,0.15);}
.tqr-nav-inner{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:60px;
}
.tqr-nav-logo img{height:40px;width:auto;
  filter:invert(1) sepia(0.3) hue-rotate(5deg) brightness(1.15);
  drop-shadow:0 0 8px rgba(255,215,0,0.4));
}
.nav-links{display:flex;gap:0.3rem;align-items:center;}
.nav-link{
  color:rgba(255,255,255,0.7);text-decoration:none;
  font-size:0.82rem;padding:0.4rem 0.7rem;border-radius:8px;
  transition:all 0.3s;white-space:nowrap;
}
.nav-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
.nav-link.active{color:#ffd700;background:rgba(255,215,0,0.1);}
.nav-cta{
  background:linear-gradient(135deg,rgba(128,0,255,0.3),rgba(0,200,200,0.3));
  color:#fff !important;border:1px solid rgba(128,0,255,0.3);
  margin-left:0.5rem;
}
.nav-cta:hover{background:linear-gradient(135deg,rgba(128,0,255,0.5),rgba(0,200,200,0.5));}
.nav-hamburger{
  display:none;flex-direction:column;gap:5px;cursor:pointer;
  background:none;border:none;padding:8px;
}
.nav-hamburger span{
  width:24px;height:2px;background:#fff;border-radius:2px;
  transition:all 0.3s;
}
@media(max-width:1024px){
  .nav-links{
    position:fixed;top:60px;right:-300px;width:280px;
    height:calc(100vh - 60px);
    background:rgba(10,10,26,0.95);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    flex-direction:column;padding:1.5rem;gap:0.3rem;
    transition:right 0.3s;border-left:1px solid rgba(255,255,255,0.06);
    overflow-y:auto;
  }
  .nav-links.open{right:0;}
  .nav-hamburger{display:flex;}
  .nav-link{font-size:0.95rem;padding:0.7rem 1rem;}
}
</style>
